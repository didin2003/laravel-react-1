apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-frontend
  namespace: apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: react
  template:
    metadata:
      labels:
        app: react
    spec:
      containers:
      - name: react
        image: didin8080/frontend:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: react-config
