apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: apps
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: apps-cors-middleware@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - api.didin.in
      secretName: api-didin-tls
  rules:
    - host: api.didin.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 80

